<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clínica Odontológica</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
        #chat-container { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; }
        #chat-messages { min-height: 200px; }
        #chat-input { width: 80%; padding: 5px; }
        button { padding: 5px 10px; }
        .mensagem { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🦷 Clínica Odontológica</h1>
    <p><a href="/agendar">📅 Agendar consulta</a></p>
    <h2>Chat com DentBot</h2>
    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

    <script>
        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            adicionarMensagem('Você', msg);
            input.value = '';

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: msg })
            })
            .then(res => res.json())
            .then(data => {
                adicionarMensagem('DentBot', data.resposta);
            })
            .catch(err => {
                adicionarMensagem('DentBot', 'Erro ao conectar.');
            });
        }

        function adicionarMensagem(remetente, texto) {
            const div = document.getElementById('chat-messages');
            const p = document.createElement('p');
            p.className = 'mensagem';
            p.innerHTML = `<strong>${remetente}:</strong> ${texto}`;
            div.appendChild(p);
            div.scrollTop = div.scrollHeight;
        }

        // Permitir enviar com Enter
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enviarMensagem();
        });
    </script>
</body>
</html>
